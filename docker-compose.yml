services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d transactions"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgres://test:test@db:5432/transactions?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
